name: CI

# Единственный источник тестового сигнала: PR-ы получают проверку, а деплой
# вызывает этот же воркфлоу через workflow_call и не раскатывает прод, пока
# тесты не прошли (см. deploy-stream.yml).
on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

# github.workflow в вызванном (workflow_call) прогоне — имя ВЫЗЫВАЮЩЕГО
# воркфлоу, поэтому оно и разводит группы: standalone-прогон на main и
# прогон, вызванный из deploy-stream.yml, иначе падают в одну группу
# ci-<ref>, и cancel-in-progress убивает один другим. Тесты при этом
# отрабатывают (внутри деплоя), но в истории остаётся «cancelled», а
# самостоятельный сигнал CI на main пропадает.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 22 — та же версия, что в Dockerfile приложения, в release.yml и в
      # deploy/chat-service. Раньше приложение ехало на 20, а тесты на 20 не
      # запускались вовсе (glob в `node --test` только с 21+), так что код
      # никогда не проверялся на своей прод-версии.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm test

  # Сборку образа не проверяло вообще ничто: Dockerfile ломался бы молча и
  # обнаруживался только при docker compose up у оператора. Отдельный job,
  # чтобы падение сборки не выглядело как падение тестов.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build app image
        run: docker build -t v-amber:ci .
      # Дым: образ должен стартовать интерпретатор и подтянуть зависимости.
      - name: Smoke — deps load on this Node
        run: |
          docker run --rm v-amber:ci node -e "
            require('ws'); require('@grpc/grpc-js'); require('dotenv');
            console.log('node', process.version, '— deps ok');
          "

      # «Образ собрался» и «приложение живое» — разные утверждения, и второе
      # до сих пор не проверялось ничем. Поднимаем контейнер целиком и ждём
      # ответа по HTTP. YANDEX_SPEECHKIT_API_KEY фиктивный: config.js требует
      # переменную при старте, но сам ключ нужен только при подключении к
      # SpeechKit, которого здесь не происходит. Остальное имеет умолчания;
      # VK/МойСклад не сконфигурированы и деградируют штатно.
      - name: Smoke — app boots and serves on this Node
        run: |
          docker run -d --name v-amber-smoke \
            -e YANDEX_SPEECHKIT_API_KEY=dummy-key-for-ci \
            -p 8080:8080 v-amber:ci
          ok=
          for i in $(seq 1 25); do
            if curl -sf -o /dev/null http://127.0.0.1:8080/; then ok=1; break; fi
            sleep 1
          done
          echo "── логи контейнера ──"
          docker logs v-amber-smoke 2>&1 | tail -20
          docker rm -f v-amber-smoke >/dev/null
          if [ "$ok" != 1 ]; then
            echo "приложение не ответило на / за 25с" >&2
            exit 1
          fi
          echo "приложение поднялось и отвечает"
