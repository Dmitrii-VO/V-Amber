name: CI

# Единственный источник тестового сигнала: PR-ы получают проверку, а деплой
# вызывает этот же воркфлоу через workflow_call и не раскатывает прод, пока
# тесты не прошли (см. deploy-stream.yml).
on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

# github.workflow в вызванном (workflow_call) прогоне — имя ВЫЗЫВАЮЩЕГО
# воркфлоу, поэтому оно и разводит группы: standalone-прогон на main и
# прогон, вызванный из deploy-stream.yml, иначе падают в одну группу
# ci-<ref>, и cancel-in-progress убивает один другим. Тесты при этом
# отрабатывают (внутри деплоя), но в истории остаётся «cancelled», а
# самостоятельный сигнал CI на main пропадает.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node 22, а не 20 из Dockerfile приложения: скрипт `npm test` зовёт
      # `node --test "test/**/*.test.js"`, а glob-паттерны тест-раннер
      # понимает только с Node 21+ — на 20 команда не отработает вовсе.
      # Расхождение (прод на 20, тесты на 22) осознанное и разбирается
      # отдельно, см. knowledge/wiki/log.md за 2026-07-16.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm test
