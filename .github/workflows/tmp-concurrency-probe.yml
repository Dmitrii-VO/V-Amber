name: TMP concurrency probe

# ВРЕМЕННЫЙ воркфлоу — удаляется из этой же ветки до мержа.
#
# Проверяет ровно одно утверждение, на котором держится фикс в ci.yml:
# что github.workflow в вызванном (workflow_call) прогоне — это имя
# ВЫЗЫВАЮЩЕГО воркфлоу, а не самого ci.yml. Если так, то группы разъезжаются
#   standalone : ci-CI-<ref>
#   вызванный  : ci-TMP concurrency probe-<ref>
# и оба прогона доживают до конца. Если же github.workflow в обоих случаях
# "CI", группа одна, cancel-in-progress убьёт один из них — и это будет
# видно как cancelled, то есть фикс не работает и нужен другой признак.
#
# На PR это единственный способ столкнуть standalone и вызванный прогоны:
# deploy-stream.yml (настоящий вызывающий) запускается только на push в main
# и раскатывает прод, а гонять боевой деплой ради проверки нельзя.
on: pull_request

jobs:
  call-ci:
    uses: ./.github/workflows/ci.yml
