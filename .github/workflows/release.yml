name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Determine target version
        id: ver
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PREV_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          PREV_VERSION="${PREV_TAG#v}"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ -z "$PREV_VERSION" ] || [ "$CURRENT" != "$PREV_VERSION" ]; then
            # Version bumped manually (or first release) — use as-is.
            echo "target=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "needs_bump=false" >> "$GITHUB_OUTPUT"
          else
            # No manual bump — auto-bump patch.
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            NEW="$MAJOR.$MINOR.$((PATCH + 1))"
            echo "target=$NEW" >> "$GITHUB_OUTPUT"
            echo "needs_bump=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump package.json and commit
        if: steps.ver.outputs.needs_bump == 'true'
        run: |
          node -e "
            const fs=require('fs');
            const p=JSON.parse(fs.readFileSync('package.json','utf8'));
            p.version='${{ steps.ver.outputs.target }}';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
          git add package.json
          git commit -m "chore: bump version to ${{ steps.ver.outputs.target }} [skip ci]"
          git push origin main

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.ver.outputs.target }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping."
            exit 0
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --target "$(git rev-parse HEAD)"
