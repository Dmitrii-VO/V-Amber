name: Deploy stream viewer + chat service

# Деплоит на cloud только то, что реально поменялось: статическую страницу
# /efir/ (deploy/stream-viewer) и chat-service (deploy/chat-service).
# Запускается ТОЛЬКО на push в main (не на pull_request!) — репозиторий
# публичный, и секреты не должны быть доступны воркфлоу, запущенным из форков.
on:
  push:
    branches: [main]
    paths:
      - 'deploy/stream-viewer/**'
      - 'deploy/chat-service/**'
      - '.github/workflows/deploy-stream.yml'

concurrency:
  group: deploy-stream
  cancel-in-progress: false

jobs:
  # Прод не должен обгонять красные тесты: раскатка идёт на живой хост, где
  # рядом работает pay-service, и до 2026-07-16 деплой стартовал вообще без
  # какого-либо прогона тестов. Переиспользуем ci.yml, а не дублируем шаги,
  # чтобы тестовый сигнал был один и тот же и здесь, и на PR-ах.
  test:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      # Ключ ci-deploy ограничен форс-командой (deploy/ci/ci-deploy-dispatch.sh
      # на сервере) — умеет только эти три операции, ничего больше.
      - name: Deploy stream-viewer static page
        env:
          HOST: ${{ secrets.DEPLOY_SSH_HOST }}
        run: |
          rsync -az -e "ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=$HOME/.ssh/known_hosts" \
            deploy/stream-viewer/index.html deploy/stream-viewer/app.js deploy/stream-viewer/hls.min.js \
            ci-deploy@"$HOST":/var/www/stream-viewer/

      - name: Deploy chat-service and restart
        env:
          HOST: ${{ secrets.DEPLOY_SSH_HOST }}
        run: |
          rsync -az -e "ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=$HOME/.ssh/known_hosts" \
            deploy/chat-service/server.js deploy/chat-service/docker-compose.yml \
            ci-deploy@"$HOST":/srv/chat-service/
          ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile="$HOME/.ssh/known_hosts" ci-deploy@"$HOST" restart-chat

      # Проверка гонится с рестартом контейнера: `restart-chat` возвращает
      # управление, как только docker принял команду, а не когда chat-service
      # реально начал слушать — в это окно nginx отдаёт 502 и `curl -sf`
      # падает с кодом 22 при полностью успешном деплое (так и случилось на
      # первом реальном прогоне: health-check стукнулся через 2с после
      # рестарта). Поэтому ретраим: --retry-all-errors нужен, чтобы ретраились
      # и HTTP-ошибки, а не только сетевые.
      - name: Health check
        run: |
          curl -sf --retry 5 --retry-delay 2 --retry-all-errors \
            https://www.xn--80azkg6cn.space/efir/ > /dev/null
          curl -sf --retry 10 --retry-delay 3 --retry-all-errors \
            https://www.xn--80azkg6cn.space/chat/health
