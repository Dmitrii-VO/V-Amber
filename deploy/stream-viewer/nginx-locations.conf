# Стрим для зрителей — вставить внутрь 443-vhost'а в
# /etc/nginx/sites-enabled/amberapp_domain.conf на хосте cloud
# (рядом с уже существующим location /mediamtx/).
#
# Конвенция правки: бэкап в *.bak.<epoch> → nginx -t → systemctl reload nginx.

# Страница зрителя: https://www.xn--80azkg6cn.space/efir/
location = /efir { return 301 /efir/; }
location /efir/ {
    alias /var/www/stream-viewer/;
    index index.html;
}

# HLS от MediaMTX (127.0.0.1:8888) через 443 — тот же origin, что и страница,
# поэтому нет ни mixed content, ни CORS.
location /live/ {
    proxy_pass http://127.0.0.1:8888;
    proxy_buffering off;          # сегменты уходят зрителю сразу
    add_header Cache-Control "no-store";
}
