# Стрим для зрителей — вставить внутрь 443-vhost'а www в
# /etc/nginx/sites-enabled/amberapp_domain.conf на хосте cloud
# (рядом с уже существующим location /mediamtx/).
#
# Конвенция правки: бэкап в *.bak.<epoch> → nginx -t → systemctl reload nginx.
#
# ВАЖНО про CSP: vhost задаёт строгий Content-Security-Policy
# (script-src 'self', default-src 'self' без media-src). Для /efir/ этого
# мало: hls.js играет видео через blob:-URL (MSE). Любой add_header в
# location ЗАМЕЩАЕТ все унаследованные add_header'ы vhost'а, поэтому здесь
# переобъявлен и CSP (с media-src blob:), и остальные security-заголовки.
# JS страницы вынесен в app.js (инлайн-скрипты остаются запрещёнными).

# Страница зрителя: https://www.xn--80azkg6cn.space/efir/
location = /efir { return 301 /efir/; }
location /efir/ {
    alias /var/www/stream-viewer/;
    index index.html;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; object-src 'none'; connect-src 'self'; img-src 'self' data:; media-src 'self' blob:; script-src 'self'; style-src 'self' 'unsafe-inline'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

# HLS от MediaMTX (127.0.0.1:8888) через 443 — тот же origin, что и страница,
# поэтому нет ни mixed content, ни CORS.
location /live/ {
    proxy_pass http://127.0.0.1:8888;
    proxy_buffering off;          # сегменты уходят зрителю сразу
    add_header Cache-Control "no-store";
}

# Чат зрителей (deploy/chat-service, 127.0.0.1:8890). Публичные эндпоинты
# сервис защищает сам (token зрителя + рейт-лимиты); операторский фид —
# по X-Chat-Token, который знают только nginx-клиенты с секретом.
# Отдаёт только JSON и redirect'ы, инлайн-скриптов нет — CSP vhost'а не мешает.
location /chat/ {
    proxy_pass http://127.0.0.1:8890;
    proxy_buffering off;
    proxy_set_header X-Real-IP $remote_addr;
    add_header Cache-Control "no-store";
}
